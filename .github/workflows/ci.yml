name: CI

on:
  push:
    branches:
      - dev
      - main
      - "feature*"
  pull_request:
    branches:
      - dev
      - main

jobs:
  checks:
    name: Tests and quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run project checks
        env:
          PYTEST: pytest
          RUFF: ruff
          MYPY: mypy
          ALEMBIC: alembic
        run: make check

      - name: Check Alembic SQL generation
        env:
          ALEMBIC: alembic
        run: make alembic-sql

      - name: Build Sphinx documentation
        env:
          SPHINXBUILD: sphinx-build
        run: make docs
