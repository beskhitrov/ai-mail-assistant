services:
  backend:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: local
      APP_NAME: AI Mail Assistant
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/ai_mail_assistant
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_mail_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_mail_assistant"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
